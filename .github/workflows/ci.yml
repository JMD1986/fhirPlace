name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, master]

# Cancel in-flight runs for the same PR/branch so only the latest commit is checked.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Type-check ────────────────────────────────────────────────────────────
      - name: Type-check
        run: npx tsc --noEmit

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: Lint
        run: npx eslint src

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: Test
        run: npx vitest run

      # ── Security audit ────────────────────────────────────────────────────────
      - name: Audit dependencies
        run: npm audit --audit-level=high

      # ── Docker build check ────────────────────────────────────────────────────
      - name: Build API Docker image
        run: docker build -t fhirplace-api .
