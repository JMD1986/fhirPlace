# fly.toml app configuration file generated for fhirplace-solitary-river-4624 on 2026-03-06T23:02:43-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fhirplace-solitary-river-4624'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://+:5001'
  FHIRPLACE_DB_PATH = '/data/fhir.db'

[[mounts]]
  source = 'fhirplace_db'
  destination = '/data'

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
